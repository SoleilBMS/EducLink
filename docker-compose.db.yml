services:
  postgres:
    image: postgres:16-alpine
    container_name: educlink-postgres
    environment:
      POSTGRES_DB: educlink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d educlink"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - educlink-postgres-data:/var/lib/postgresql/data

volumes:
  educlink-postgres-data:
